<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мобильный Марио на HTML5</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            touch-action: none; /* Отключаем стандартные жесты масштабирования */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 400px;
            background-color: #5c94fc;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Начальный экран */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #202028, #101015);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 38px;
            color: #ff1f1f;
            text-shadow: 3px 3px #ffcc00;
            margin-bottom: 20px;
            text-align: center;
        }

        .level-btn {
            background-color: #ffcc00;
            color: #222;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 6px;
            border-radius: 8px;
            box-shadow: 0 4px #b89200;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Интерфейс игры */
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            display: none;
            z-index: 5;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 8;
        }

        /* Экранные кнопки для телефона */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 800px;
            height: 110px;
            background: #222;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            user-select: none;
        }

        .control-group {
            display: flex;
            gap: 15px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            cursor: pointer;
            transition: background 0.1s;
        }

        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Начальное меню -->
        <div id="menu-screen">
            <h1>MOBILE MARIO</h1>
            <p style="margin-bottom: 20px; color: #aaa; font-size: 14px;">Выберите уровень:</p>
            <button class="level-btn" onclick="startGame(1)">Уровень 1</button>
            <button class="level-btn" onclick="startGame(2)">Уровень 2</button>
            <button class="level-btn" onclick="startGame(3)">Уровень 3</button>
        </div>

        <!-- Интерфейс -->
        <div id="ui">
            Монеты: <span id="coins-count">0</span> / <span id="total-coins">3</span>
        </div>

        <!-- Экран финала -->
        <div id="game-over-screen">
            <h2 id="end-title" style="font-size: 30px; margin-bottom: 15px;">ПОБЕДА!</h2>
            <button class="level-btn" onclick="returnToMenu()">В меню</button>
        </div>

        <!-- Холст игры -->
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

    <!-- Виртуальные кнопки управления под игрой -->
    <div id="mobile-controls">
        <div class="control-group">
            <button class="ctrl-btn" id="btn-left">◀</button>
            <button class="ctrl-btn" id="btn-right">▶</button>
        </div>
        <div class="control-group">
            <button class="ctrl-btn" id="btn-jump">▲</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const menuScreen = document.getElementById("menu-screen");
        const uiElement = document.getElementById("ui");
        const gameOverScreen = document.getElementById("game-over-screen");
        const mobileControls = document.getElementById("mobile-controls");
        const endTitle = document.getElementById("end-title");
        const coinsCountSpan = document.getElementById("coins-count");
        const totalCoinsSpan = document.getElementById("total-coins");

        let gameInterval = null;
        let currentLevel = 1;
        let keys = {};

        let player, platforms, coins, enemies, flagpole;
        let scoreCoins = 0;
        let totalCoinsInLevel = 0;

        // Поддержка клавиатуры (на случай игры с ПК)
        window.addEventListener("keydown", (e) => { keys[e.code] = true; });
        window.addEventListener("keyup", (e) => { keys[e.code] = false; });

        // Поддержка сенсорных экранных кнопок
        function setupTouchButton(id, code) {
            const btn = document.getElementById(id);
            btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[code] = true; btn.classList.add("active"); });
            btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[code] = false; btn.classList.remove("active"); });
            btn.addEventListener("mousedown", () => { keys[code] = true; btn.classList.add("active"); });
            btn.addEventListener("mouseup", () => { keys[code] = false; btn.classList.remove("active"); });
        }

        setupTouchButton("btn-left", "ArrowLeft");
        setupTouchButton("btn-right", "ArrowRight");
        setupTouchButton("btn-jump", "Space");

        // Уровни
        const levelsData = {
            1: {
                bgColor: "#5c94fc",
                groundColor: "#c84c0c",
                platforms: [
                    {x: 0, y: 350, w: 800, h: 50},
                    {x: 300, y: 260, w: 120, h: 20},
                    {x: 500, y: 180, w: 120, h: 20}
                ],
                coins: [
                    {x: 350, y: 220, collected: false},
                    {x: 550, y: 140, collected: false},
                    {x: 720, y: 300, collected: false}
                ],
                enemies: [
                    {x: 400, y: 320, w: 30, h: 30, vx: 1, minX: 300, maxX: 600}
                ],
                flagpole: {x: 750, y: 200, w: 10, h: 150}
            },
            2: {
                bgColor: "#222244",
                groundColor: "#444466",
                platforms: [
                    {x: 0, y: 350, w: 800, h: 50},
                    {x: 200, y: 280, w: 100, h: 20},
                    {x: 380, y: 210, w: 100, h: 20},
                    {x: 560, y: 140, w: 100, h: 20}
                ],
                coins: [
                    {x: 240, y: 240, collected: false},
                    {x: 420, y: 170, collected: false},
                    {x: 600, y: 100, collected: false}
                ],
                enemies: [
                    {x: 250, y: 320, w: 30, h: 30, vx: 2, minX: 50, maxX: 350},
                    {x: 500, y: 320, w: 30, h: 30, vx: -2, minX: 400, maxX: 700}
                ],
                flagpole: {x: 750, y: 200, w: 10, h: 150}
            },
            3: {
                bgColor: "#400000",
                groundColor: "#660000",
                platforms: [
                    {x: 0, y: 350, w: 800, h: 50},
                    {x: 150, y: 290, w: 80, h: 20},
                    {x: 300, y: 230, w: 80, h: 20},
                    {x: 450, y: 170, w: 80, h: 20},
                    {x: 600, y: 110, w: 80, h: 20}
                ],
                coins: [
                    {x: 180, y: 250, collected: false},
                    {x: 330, y: 190, collected: false},
                    {x: 480, y: 130, collected: false},
                    {x: 630, y: 70, collected: false}
                ],
                enemies: [
                    {x: 200, y: 320, w: 30, h: 30, vx: 2.5, minX: 50, maxX: 350},
                    {x: 450, y: 320, w: 30, h: 30, vx: -2.5, minX: 380, maxX: 720},
                    {x: 320, y: 200, w: 30, h: 30, vx: 1.5, minX: 300, maxX: 380}
                ],
                flagpole: {x: 750, y: 200, w: 10, h: 150}
            }
        };

        function startGame(levelNum) {
            currentLevel = levelNum;
            menuScreen.style.display = "none";
            gameOverScreen.style.display = "none";
            uiElement.style.display = "block";
            mobileControls.style.display = "flex"; // Показываем кнопки на телефоне

            const data = levelsData[currentLevel];
            scoreCoins = 0;
            totalCoinsInLevel = data.coins.length;
            coinsCountSpan.innerText = scoreCoins;
            totalCoinsSpan.innerText = totalCoinsInLevel;

            player = {
                x: 50,
                y: 200,
                w: 26,
                h: 36,
                vx: 0,
                vy: 0,
                speed: 4,
                jumpPower: -10,
                gravity: 0.5,
                grounded: false
            };

            platforms = JSON.parse(JSON.stringify(data.platforms));
            coins = JSON.parse(JSON.stringify(data.coins));
            enemies = JSON.parse(JSON.stringify(data.enemies));
            flagpole = JSON.parse(JSON.stringify(data.flagpole));

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 1000 / 60);
        }

        function returnToMenu() {
            clearInterval(gameInterval);
            gameOverScreen.style.display = "none";
            uiElement.style.display = "none";
            mobileControls.style.display = "none";
            menuScreen.style.display = "flex";
        }

        function gameOver(win) {
            clearInterval(gameInterval);
            gameOverScreen.style.display = "flex";
            if (win) {
                endTitle.innerText = "УРОВЕНЬ ПРОЙДЕН!";
                endTitle.style.color = "#4caf50";
            } else {
                endTitle.innerText = "ИГРА ОКОНЧЕНА";
                endTitle.style.color = "#ff1f1f";
            }
        }

        function update() {
            if (keys["ArrowLeft"]) {
                player.vx = -player.speed;
            } else if (keys["ArrowRight"]) {
                player.vx = player.speed;
            } else {
                player.vx = 0;
            }

            if (keys["Space"] && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            player.vy += player.gravity;

            player.x += player.vx;
            platforms.forEach(p => {
                if (checkCollision(player, p)) {
                    if (player.vx > 0) player.x = p.x - player.w;
                    else if (player.vx < 0) player.x = p.x + p.w;
                }
            });

            player.grounded = false;
            player.y += player.vy;
            platforms.forEach(p => {
                if (checkCollision(player, p)) {
                    if (player.vy > 0) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                    } else if (player.vy < 0) {
                        player.y = p.y + p.h;
                        player.vy = 0;
                    }
                }
            });

            if (player.y > canvas.height) {
                gameOver(false);
            }

            enemies.forEach(e => {
                e.x += e.vx;
                if (e.x < e.minX || e.x > e.maxX) {
                    e.vx *= -1;
                }

                if (checkCollision(player, e)) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                        enemies = enemies.filter(enemy => enemy !== e);
                        player.vy = -6;
                    } else {
                        gameOver(false);
                    }
                }
            });

            coins.forEach(c => {
                if (!c.collected && checkCollision(player, {x: c.x, y: c.y, w: 20, h: 20})) {
                    c.collected = true;
                    scoreCoins++;
                    coinsCountSpan.innerText = scoreCoins;
                }
            });

            if (checkCollision(player, flagpole)) {
                gameOver(true);
            }

            draw();
        }

        function checkCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h &&
                   r1.y + r1.h > r2.y;
        }

        function draw() {
            const data = levelsData[currentLevel];
            ctx.fillStyle = data.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            platforms.forEach(p => {
                ctx.fillStyle = (p.y === 350) ? data.groundColor : "#c84c0c";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#000";
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            coins.forEach(c => {
                if (!c.collected) {
                    ctx.fillStyle = "#ffd700";
                    ctx.beginPath();
                    ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = "#cc9900";
                    ctx.stroke();
                }
            });

            ctx.fillStyle = "#fff";
            ctx.fillRect(flagpole.x, flagpole.y, flagpole.w, flagpole.h);
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(flagpole.x + flagpole.w, flagpole.y, 25, 20);

            enemies.forEach(e => {
                ctx.fillStyle = "#b55220";
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.strokeStyle = "#000";
                ctx.strokeRect(e.x, e.y, e.w, e.h);
                ctx.fillStyle = "#fff";
                ctx.fillRect(e.x + 5, e.y + 8, 6, 8);
                ctx.fillRect(e.x + 18, e.y + 8, 6, 8);
            });

            ctx.fillStyle = "#e52521";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            
            ctx.fillStyle = "#ffcc99";
            ctx.fillRect(player.x + 6, player.y + 4, 14, 10);
        }
    </script>
</body>
</html>
